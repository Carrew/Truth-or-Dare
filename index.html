<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truth or Dare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="home" class="screen">
    <h1 class="title">Truth or Dare</h1>
    <p class="subtitle">Pick your poison</p>

    <div class="menu">
      <button onclick="startGame('truth')">Truth</button>
      <button onclick="startGame('dare')">Dare</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="screen hidden">
    <div id="promptBox" class="prompt">Ready?</div>

    <div class="controls">
      <button onclick="nextPrompt()">Next</button>
      <button onclick="backHome()">Home</button>
    </div>
  </div>

  <script src="core/game.js"></script>
  <script src="script.js"></script>

</body>
</html>
