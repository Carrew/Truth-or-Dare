<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truth or Dare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME -->
  <div id="home" class="screen">
    <h1 class="title">Truth or Dare</h1>

    <div class="menu">
      <button onclick="startGame('truth')">Truth</button>
      <button onclick="startGame('dare')">Dare</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen hidden">

    <div id="card" class="card" onclick="reveal()">
      <div id="cardText">Tap to reveal</div>
    </div>

    <div id="status" class="status">Tap the card</div>

    <button onclick="backHome()">Home</button>

  </div>

  <script src="core/game.js"></script>
  <script src="script.js"></script>

</body>
</html>
